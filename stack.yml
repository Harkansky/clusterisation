version: "3.8"

services:
  timescaledb:
    image: timescale/timescaledb:2.25.0-pg17
    environment:
      POSTGRES_USER: infoclimat
      POSTGRES_PASSWORD: infoclimat2026
      POSTGRES_DB: meteodb
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - /root/clusterisation/db_data/meteodb_dump.sql:/docker-entrypoint-initdb.d/dump.sql:ro
    networks:
      - bd_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infoclimat -d meteodb"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 40s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  backend:
    image: 192.168.100.10:5000/backend:latest
    environment:
      DEBUG: "False"
      SECRET_KEY: django-insecure-swarm-change-in-production
      ALLOWED_HOSTS: "*"
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      DB_HOST: timescaledb
      DB_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://app.local,http://localhost,http://192.168.100.10"
    networks:
      - app_net
      - bd_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  frontend:
    image: 192.168.100.10:5000/frontend:latest
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: /api/v1
    networks:
      - app_net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /root/clusterisation/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  app_net:
    driver: overlay
  bd_net:
    driver: overlay

volumes:
  timescaledb-data:
    driver: local
